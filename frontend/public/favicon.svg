<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#grad1)" opacity="0.15"/>
  <!-- Coin shape -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="url(#grad1)" stroke-width="2"/>
  <!-- Inner circle -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.6"/>
  <!-- Crypto symbol (upward arrow/chart) -->
  <g fill="url(#grad1)" filter="url(#glow)">
    <!-- Upward arrow -->
    <path d="M 32 18 L 28 24 L 30 24 L 30 38 L 34 38 L 34 24 L 36 24 Z" stroke="url(#grad1)" stroke-width="0.5"/>
    <!-- Dollar sign inside -->
    <circle cx="32" cy="32" r="4" fill="none" stroke="url(#grad1)" stroke-width="1"/>
  </g>
</svg>
